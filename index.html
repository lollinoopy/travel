<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엄마 아빠 여행 포털</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FDF6ED;
    --warm: #F0E2CC;
    --terracotta: #C4714A;
    --deep: #2C1A0E;
    --gold: #D4A853;
    --muted: #8C7B6E;
    --text: #3D2B1F;
    /* 주차별 색상 팔레트 */
    --w1: #0047FF; --w2: #ef6c00; --w3: #2e7d32; --w4: #6A5EA8; --w5: #d32f2f; --w6: #D4A853;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  .page { display: block; }
  .hidden { display: none !important; }

  .hero {
    background: linear-gradient(135deg, #2C1A0E 0%, #5B3A22 50%, #C4714A 100%);
    padding: 40px 24px; text-align: center; position: relative; overflow: hidden;
  }
  .hero h1 { font-family: 'Noto Serif KR', serif; font-size: 28px; color: #FDF6ED; margin-bottom: 8px; }
  .hero h1 span { color: var(--gold); }
  .hero p { color: rgba(253,246,237,0.6); font-size: 13px; }

  .container { max-width: 680px; margin: 0 auto; padding: 20px 20px 60px; }

  /* 메인 메뉴 카드 스타일 */
  .grid { display: grid; gap: 10px; grid-template-columns: repeat(3, 1fr); }
  .btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px 10px; border-radius: 14px; border: 1.5px solid rgba(44,26,14,0.07);
    background: white; text-decoration: none; color: var(--text); transition: all 0.2s; cursor: pointer;
  }
  .btn:active { transform: scale(0.95); background: #f0f0f0; }
  .btn-itin { grid-column: span 3; flex-direction: row; gap: 15px; background: var(--deep); color: white; border: none; }
  .btn-itin .btn-name { color: white; font-size: 16px; }
  
  .logo { font-size: 24px; margin-bottom: 8px; }
  .btn-name { font-weight: 600; font-size: 14px; text-align: center; }
  .btn-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* --- 일정 페이지 스타일 --- */
  .itinerary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .add-btn { background: var(--terracotta); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
  
  #editable-itinerary-container { position: relative; padding-left: 55px; }
  #editable-itinerary-container::before {
    content: ''; position: absolute; left: 22px; top: 0; bottom: 0; width: 2px; background: var(--warm);
  }

  .editable-day-item { position: relative; margin-bottom: 20px; cursor: grab; }
  .editable-day-item.dragging { opacity: 0.5; }

  .timeline-dot-wrapper {
    position: absolute; left: -50px; top: 0; display: flex; flex-direction: column; align-items: center; width: 45px;
  }
  .timeline-dot { width: 18px; height: 18px; background: white; border: 4px solid #ccc; border-radius: 50%; box-shadow: 0 0 0 3px white; }
  
  /* 주차별 도트 색상 */
  .dot-w1 { border-color: var(--w1); } .dot-w2 { border-color: var(--w2); }
  .dot-w3 { border-color: var(--w3); } .dot-w4 { border-color: var(--w4); }
  .dot-w5 { border-color: var(--w5); } .dot-w6 { border-color: var(--w6); }

  .day-label { font-size: 11px; font-weight: 700; color: var(--deep); margin-top: 5px; white-space: nowrap; }

  .day-content { 
    background: white; border: 1px solid var(--border-color); border-radius: 12px; 
    padding: 12px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.03);
  }
  .box-label { font-size: 11px; font-weight: 700; color: #999; }
  
  /* 입력창 스타일 */
  .city-in {
    width: 100%; border: none; border-bottom: 2px solid var(--warm); padding: 4px 0;
    font-size: 15px; font-weight: 700; color: var(--deep); background: transparent; margin-bottom: 5px;
  }
  .city-in:focus { outline: none; border-color: var(--terracotta); }
  
  textarea {
    width: 100%; border: 1px solid #f5f5f5; border-radius: 6px; padding: 6px 8px; 
    font-size: 13px; resize: none; background: #fafafa; height: 45px; font-family: inherit;
  }
  .delete-btn { align-self: flex-end; border: none; background: #fff1f0; color: #f5222d; padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }

  .back-btn { display: inline-flex; align-items: center; gap: 5px; margin-bottom: 15px; color: var(--terracotta); cursor: pointer; font-size: 14px; font-weight: 600; }
</style>
</head>
<body>

<div id="main-page" class="page">
  <div class="hero">
    <h1>엄마 아빠 <span>여행</span> 포털</h1>
    <p>90일간의 소중한 기록</p>
  </div>
  <div class="container">
    <div class="grid">
      <div onclick="showPage('itinerary-page')" class="btn btn-itin">
        <div class="logo">📅</div>
        <div><div class="btn-name">나만의 일정 (90일)</div><div class="btn-sub" style="color:rgba(255,255,255,0.7)">도시와 세부 일정을 함께 기록해요</div></div>
      </div>
      <a href="https://www.skyscanner.co.kr" target="_blank" class="btn"><div class="logo">✈️</div><div class="btn-name">항공권</div></a>
      <div onclick="showPage('stay-page')" class="btn"><div class="logo">🏨</div><div class="btn-name">숙소</div></div>
      <div onclick="showPage('transport-page')" class="btn"><div class="logo">🚂</div><div class="btn-name">교통</div></div>
      <div onclick="showPage('sights-page')" class="btn"><div class="logo">🏛️</div><div class="btn-name">볼 것</div></div>
      <div onclick="showPage('food-page')" class="btn"><div class="logo">🍕</div><div class="btn-name">먹을 것</div></div>
      <a href="https://papago.naver.com" target="_blank" class="btn"><div class="logo">🦜</div><div class="btn-name">번역</div></a>
    </div>
  </div>
</div>

<div id="itinerary-page" class="page hidden">
  <div class="hero">
    <h1>우리의 <span>일정</span></h1>
    <p>도시 이름을 적어 큰 동선을 확인하세요</p>
  </div>
  <div class="container">
    <div onclick="showPage('main-page')" class="back-btn">← 돌아가기</div>
    <div class="itinerary-header">
      <div style="font-size: 12px; color: var(--muted);">자동 저장 중 💾</div>
      <button class="add-btn" onclick="addDay()">하루 추가</button>
    </div>
    <div id="editable-itinerary-container"></div>
  </div>
</div>

<div id="stay-page" class="page hidden"><div class="container"><div onclick="showPage('main-page')" class="back-btn">← 돌아가기</div><h2 style="margin-bottom:20px">숙소</h2><div class="grid" style="grid-template-columns:1fr"><a href="https://kr.hotels.com/" target="_blank" class="btn">호텔</a><a href="https://www.airbnb.co.kr" target="_blank" class="btn">에어비앤비</a><a href="https://www.theminda.com/" target="_blank" class="btn">한인민박</a></div></div></div>
<div id="transport-page" class="page hidden"><div class="container"><div onclick="showPage('main-page')" class="back-btn">← 돌아가기</div><h2 style="margin-bottom:20px">교통</h2><div class="grid" style="grid-template-columns:1fr"><a href="https://www.omio.co.kr/" target="_blank" class="btn">기차 (Omio)</a><div onclick="window.open('https://www.google.com/maps/search/restaurants')" class="btn">구글 맵스</div><a href="https://m.uber.com" target="_blank" class="btn">우버</a></div></div></div>
<div id="sights-page" class="page hidden"><div class="container"><div onclick="showPage('main-page')" class="back-btn">← 돌아가기</div><h2 style="margin-bottom:20px">볼 것</h2><div class="grid" style="grid-template-columns:1fr"><a href="https://www.kkday.com/ko" target="_blank" class="btn">KKday</a><a href="https://www.viator.com" target="_blank" class="btn">Viator</a></div></div></div>
<div id="food-page" class="page hidden"><div class="container"><div onclick="showPage('main-page')" class="back-btn">← 돌아가기</div><h2 style="margin-bottom:20px">먹을 것</h2><div class="grid" style="grid-template-columns:1fr"><div onclick="alert('GPS 연동 준비 중!')" class="btn">내 주변 맛집</div><a href="https://www.tripadvisor.co.kr/Restaurants" target="_blank" class="btn">트립어드바이저</a></div></div></div>

<script>
  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(pageId).classList.remove('hidden');
    window.scrollTo(0, 0);
  }

  const container = document.getElementById('editable-itinerary-container');
  let itineraryData = [];

  function initData() {
    const saved = localStorage.getItem('itinerary_90_v4');
    if (saved) {
      itineraryData = JSON.parse(saved);
    } else {
      // 초기 기본 데이터에 도시 추가
      itineraryData = Array.from({ length: 90 }, (_, i) => {
        let city = "";
        if (i < 7) city = "로마";
        else if (i < 14) city = "나폴리";
        else if (i < 21) city = "피렌체";
        
        return {
          city: city,
          places: (i === 0 ? "비행기 도착, 숙소 이동" : ""),
          notes: ""
        };
      });
    }
    renderItinerary();
  }

  function renderItinerary() {
    container.innerHTML = '';
    itineraryData.forEach((data, index) => {
      const weekNum = Math.floor(index / 7) + 1;
      const colorClass = 'dot-w' + (weekNum % 6 || 6);

      const item = document.createElement('div');
      item.className = 'editable-day-item';
      item.draggable = true;
      item.dataset.index = index;

      item.innerHTML = `
        <div class="timeline-dot-wrapper">
          <div class="timeline-dot ${colorClass}"></div>
          <div class="day-label">Day ${index + 1}</div>
        </div>
        <div class="day-content">
          <div class="textarea-group">
            <div class="box-label">📍 도시 이름</div>
            <input type="text" class="city-in" placeholder="예: 로마, 피렌체" value="${data.city || ''}">
          </div>
          <div class="textarea-group">
            <div class="box-label">갈곳 🗺️</div>
            <textarea class="p-in" placeholder="세부 장소를 적어주세요">${data.places || ''}</textarea>
          </div>
          <div class="textarea-group">
            <div class="box-label">참고사항 📝</div>
            <textarea class="n-in" placeholder="팁이나 메모">${data.notes || ''}</textarea>
          </div>
          <button class="delete-btn" onclick="deleteDay(${index})">삭제</button>
        </div>
      `;

      // 드래그 앤 드롭
      item.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', index);
        item.classList.add('dragging');
      });
      item.addEventListener('dragover', e => e.preventDefault());
      item.addEventListener('drop', e => {
        const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
        const toIndex = index;
        if (fromIndex !== toIndex) {
          const movedItem = itineraryData.splice(fromIndex, 1)[0];
          itineraryData.splice(toIndex, 0, movedItem);
          save(); renderItinerary();
        }
      });
      item.addEventListener('dragend', () => item.classList.remove('dragging'));

      // 입력 저장 (도시, 갈곳, 참고사항 모두 개별 저장)
      item.querySelector('.city-in').addEventListener('input', e => { itineraryData[index].city = e.target.value; save(); });
      item.querySelector('.p-in').addEventListener('input', e => { itineraryData[index].places = e.target.value; save(); });
      item.querySelector('.n-in').addEventListener('input', e => { itineraryData[index].notes = e.target.value; save(); });

      container.appendChild(item);
    });
  }

  function save() { localStorage.setItem('itinerary_90_v4', JSON.stringify(itineraryData)); }
  function addDay() { itineraryData.push({ city: "", places: "", notes: "" }); renderItinerary(); save(); }
  function deleteDay(i) { if(confirm('삭제하시겠습니까?')) { itineraryData.splice(i, 1); renderItinerary(); save(); } }

  initData();
</script>

</body>
</html>
